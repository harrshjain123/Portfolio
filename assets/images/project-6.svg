<svg width="600" height="380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#150a1e"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
    <linearGradient id="pinkbar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#E11D74"/>
      <stop offset="100%" stop-color="#F9507A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg6)" rx="16"/>
  <rect x="0" y="0" width="600" height="48" fill="rgba(255,255,255,0.04)" rx="16"/>
