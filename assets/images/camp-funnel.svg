<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a1f"/>
      <stop offset="100%" style="stop-color:#0d0f1a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg6)" rx="12"/>
  <rect x="0" y="0" width="600" height="56" fill="#08121a" rx="12"/>
  <rect x="0" y="44" width="600" height="12" fill="#08121a"/>
  <circle cx="24" cy="28" r="7" fill="#06b6d4"/>
  <text x="40" y="32" fill="#22d3ee" font-size="11" font-weight="700">FUNNEL OPTIMIZATION PROJECT</text>
  <rect x="480" y="18" width="100" height="20" rx="10" fill="#06b6d4" opacity="0.2"/>
  <text x="530" y="32" fill="#22d3ee" font-size="10" text-anchor="middle" font-weight="600">META ADS</text>

  <!-- Before/After comparison -->
  <rect x="20" y="70" width="268" height="295" rx="10" fill="#08121a"/>
  <text x="154" y="93" fill="#ef4444" font-size="12" text-anchor="middle" font-weight="700">⚠ BEFORE</text>

  <polygon points="50,108 258,108 228,148 80,148" fill="#ef4444" opacity="0.7"/>
  <text x="154" y="133" fill="#fff" font-size="10" text-anchor="middle">Impressions: 2.1M</text>
  <polygon points="80,152 228,152 210,192 98,192" fill="#ef4444" opacity="0.6"/>
  <text x="154" y="177" fill="#fff" font-size="10" text-anchor="middle">Clicks: 21,000 (1.0%)</text>
  <polygon points="98,196 210,196 200,236 108,236" fill="#ef4444" opacity="0.5"/>
  <text x="154" y="221" fill="#fff" font-size="9" text-anchor="middle">Landing Visits: 9,400</text>
  <polygon points="108,240 200,240 196,280 112,280" fill="#ef4444" opacity="0.4"/>
  <text x="154" y="265" fill="#fff" font-size="9" text-anchor="middle">Leads: 560 (5.9%)</text>
  <polygon points="112,284 196,284 188,314 120,314" fill="#ef4444" opacity="0.5"/>
  <text x="154" y="303" fill="#fff" font-size="9" text-anchor="middle">Conversions: 112</text>
  <text x="154" y="345" fill="#ef4444" font-size="10" text-anchor="middle" font-weight="700">CPL: ₹134 · ROAS: 2.8x</text>

  <!-- After -->
  <rect x="312" y="70" width="268" height="295" rx="10" fill="#08121a"/>
  <text x="446" y="93" fill="#22d3ee" font-size="12" text-anchor="middle" font-weight="700">✓ AFTER</text>

  <polygon points="342,108 550,108 524,148 368,148" fill="#06b6d4" opacity="0.85"/>
  <text x="446" y="133" fill="#fff" font-size="10" text-anchor="middle">Impressions: 2.1M</text>
  <polygon points="368,152 524,152 498,192 394,192" fill="#06b6d4" opacity="0.75"/>
  <text x="446" y="177" fill="#fff" font-size="10" text-anchor="middle">Clicks: 38,000 (1.8%)</text>
  <polygon points="394,196 498,196 482,236 410,236" fill="#06b6d4" opacity="0.65"/>
  <text x="446" y="221" fill="#fff" font-size="9" text-anchor="middle">Landing Visits: 18,800</text>
  <polygon points="410,240 482,240 472,280 420,280" fill="#06b6d4" opacity="0.55"/>
  <text x="446" y="265" fill="#fff" font-size="9" text-anchor="middle">Leads: 1,316 (7.0%)</text>
  <polygon points="420,284 472,284 460,314 432,314" fill="#06b6d4" opacity="0.8"/>
  <text x="446" y="303" fill="#fff" font-size="9" text-anchor="middle">Conversions: 284</text>
  <text x="446" y="345" fill="#22d3ee" font-size="10" text-anchor="middle" font-weight="700">CPL: ₹68 · ROAS: 4.2x</text>
</svg>
