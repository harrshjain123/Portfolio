<svg width="600" height="380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="acc1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4776E6"/>
      <stop offset="100%" stop-color="#8E54E9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg1)" rx="16"/>

  <!-- header bar -->
  <rect x="0" y="0" width="600" height="48" fill="rgba(255,255,255,0.05)" rx="16"/>
  <circle cx="20" cy="24" r="0" fill="none"/>
  <text x="22" y="31" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.5)" font-weight="600">META ADS · LEAD GENERATION</text>
  <circle cx="556" cy="24" r="8" fill="#4776E6" opacity="0.9"/>
  <circle cx="574" cy="24" r="8" fill="#8E54E9" opacity="0.7"/>

  <!-- Funnel -->
  <polygon points="100,80 500,80 430,170 170,170" fill="url(#acc1)" opacity="0.9"/>
  <polygon points="170,178 430,178 390,258 210,258" fill="#4776E6" opacity="0.75"/>
  <polygon points="210,266 390,266 360,330 240,330" fill="#8E54E9" opacity="0.85"/>

  <!-- Labels -->
  <text x="290" y="135" text-anchor="middle" font-family="Arial" font-size="15" fill="white" font-weight="700">REACH · 124,000</text>
  <text x="300" y="224" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="700">CLICKS · 3,840</text>
  <text x="300" y="305" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="700">LEADS · 312</text>

  <!-- Stats right -->
  <rect x="428" y="90" width="140" height="60" rx="10" fill="rgba(255,255,255,0.07)"/>
  <text x="498" y="116" text-anchor="middle" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.5)">CTR</text>
  <text x="498" y="138" text-anchor="middle" font-family="Arial" font-size="20" fill="#4776E6" font-weight="800">3.09%</text>

  <rect x="428" y="162" width="140" height="60" rx="10" fill="rgba(255,255,255,0.07)"/>
  <text x="498" y="188" text-anchor="middle" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.5)">CPL</text>
  <text x="498" y="210" text-anchor="middle" font-family="Arial" font-size="20" fill="#8E54E9" font-weight="800">₹96</text>

  <rect x="428" y="234" width="140" height="60" rx="10" fill="rgba(255,255,255,0.07)"/>
  <text x="498" y="260" text-anchor="middle" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.5)">CONV RATE</text>
  <text x="498" y="282" text-anchor="middle" font-family="Arial" font-size="20" fill="#4CAF50" font-weight="800">8.1%</text>

  <!-- Budget badge -->
  <rect x="22" y="300" width="160" height="52" rx="10" fill="rgba(255,255,255,0.07)"/>
  <text x="102" y="320" text-anchor="middle" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.45)">TOTAL BUDGET</text>
  <text x="102" y="342" text-anchor="middle" font-family="Arial" font-size="18" fill="white" font-weight="800">₹30,000</text>
</svg>