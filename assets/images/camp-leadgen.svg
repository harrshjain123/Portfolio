<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f6ef7"/>
      <stop offset="100%" style="stop-color:#2d4fcc"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f6ef7"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg1)" rx="12"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="600" height="56" fill="#141830" rx="12"/>
  <rect x="0" y="44" width="600" height="12" fill="#141830"/>
  <circle cx="24" cy="28" r="7" fill="#4f6ef7"/>
  <rect x="40" y="20" width="120" height="16" rx="4" fill="#1e2445"/>
  <text x="40" y="32" fill="#6b8aff" font-size="11" font-weight="700">LEAD GEN CAMPAIGN</text>
  <rect x="480" y="18" width="100" height="20" rx="10" fill="#4f6ef7" opacity="0.2"/>
  <text x="530" y="32" fill="#6b8aff" font-size="10" text-anchor="middle" font-weight="600">META ADS</text>

  <!-- KPI row -->
  <rect x="20" y="70" width="130" height="70" rx="10" fill="#1e2445"/>
  <text x="35" y="92" fill="#5a5f80" font-size="9" font-weight="600">LEADS GENERATED</text>
  <text x="35" y="118" fill="#eaecf8" font-size="24" font-weight="800">1,340+</text>
  <text x="35" y="134" fill="#34d874" font-size="10" font-weight="700">↑ 22% MoM</text>

  <rect x="165" y="70" width="130" height="70" rx="10" fill="#1e2445"/>
  <text x="180" y="92" fill="#5a5f80" font-size="9" font-weight="600">COST PER LEAD</text>
  <text x="180" y="118" fill="#eaecf8" font-size="24" font-weight="800">₹68</text>
  <text x="180" y="134" fill="#34d874" font-size="10" font-weight="700">↓ 28% reduction</text>

  <rect x="310" y="70" width="130" height="70" rx="10" fill="#1e2445"/>
  <text x="325" y="92" fill="#5a5f80" font-size="9" font-weight="600">CTR</text>
  <text x="325" y="118" fill="#eaecf8" font-size="24" font-weight="800">3.8%</text>
  <text x="325" y="134" fill="#34d874" font-size="10" font-weight="700">↑ vs 1.2% avg</text>

  <rect x="455" y="70" width="125" height="70" rx="10" fill="#1e2445"/>
  <text x="470" y="92" fill="#5a5f80" font-size="9" font-weight="600">ROAS</text>
  <text x="470" y="118" fill="#eaecf8" font-size="24" font-weight="800">4.2x</text>
  <text x="470" y="134" fill="#6b8aff" font-size="10" font-weight="700">Target: 3.5x</text>

  <!-- Bar chart -->
  <rect x="20" y="158" width="380" height="220" rx="10" fill="#141830"/>
  <text x="36" y="180" fill="#a9aecf" font-size="11" font-weight="600">Monthly Leads</text>

  <!-- Bars -->
  <rect x="50"  y="300" width="34" height="48"  rx="4" fill="url(#bar1)" opacity="0.9"/>
  <rect x="106" y="275" width="34" height="73"  rx="4" fill="url(#bar1)" opacity="0.9"/>
  <rect x="162" y="255" width="34" height="93"  rx="4" fill="url(#bar1)"/>
  <rect x="218" y="240" width="34" height="108" rx="4" fill="url(#bar1)"/>
  <rect x="274" y="215" width="34" height="133" rx="4" fill="url(#bar1)"/>
  <rect x="330" y="200" width="34" height="148" rx="4" fill="url(#bar1)"/>

  <text x="67"  y="320" fill="#5a5f80" font-size="9" text-anchor="middle">Jan</text>
  <text x="123" y="320" fill="#5a5f80" font-size="9" text-anchor="middle">Feb</text>
  <text x="179" y="320" fill="#5a5f80" font-size="9" text-anchor="middle">Mar</text>
  <text x="235" y="320" fill="#5a5f80" font-size="9" text-anchor="middle">Apr</text>
  <text x="291" y="320" fill="#5a5f80" font-size="9" text-anchor="middle">May</text>
  <text x="347" y="320" fill="#5a5f80" font-size="9" text-anchor="middle">Jun</text>

  <text x="67"  y="296" fill="#a9aecf" font-size="8" text-anchor="middle">142</text>
  <text x="123" y="271" fill="#a9aecf" font-size="8" text-anchor="middle">189</text>
  <text x="179" y="251" fill="#a9aecf" font-size="8" text-anchor="middle">224</text>
  <text x="235" y="236" fill="#a9aecf" font-size="8" text-anchor="middle">256</text>
  <text x="291" y="211" fill="#a9aecf" font-size="8" text-anchor="middle">298</text>
  <text x="347" y="196" fill="#a9aecf" font-size="8" text-anchor="middle">331</text>

  <!-- Platform info card -->
  <rect x="414" y="158" width="166" height="220" rx="10" fill="#141830"/>
  <text x="430" y="180" fill="#a9aecf" font-size="11" font-weight="600">Platform Split</text>
  <!-- Meta bar -->
  <text x="430" y="208" fill="#eaecf8" font-size="10">Facebook</text>
  <text x="560" y="208" fill="#6b8aff" font-size="10" text-anchor="end" font-weight="700">62%</text>
  <rect x="430" y="213" width="130" height="8" rx="4" fill="#1e2445"/>
  <rect x="430" y="213" width="80"  height="8" rx="4" fill="#4f6ef7"/>
  <!-- IG bar -->
  <text x="430" y="238" fill="#eaecf8" font-size="10">Instagram</text>
  <text x="560" y="238" fill="#a78bfa" font-size="10" text-anchor="end" font-weight="700">38%</text>
  <rect x="430" y="243" width="130" height="8" rx="4" fill="#1e2445"/>
  <rect x="430" y="243" width="49"  height="8" rx="4" fill="#a78bfa"/>

  <!-- Audience labels -->
  <text x="430" y="278" fill="#5a5f80" font-size="9" font-weight="600">TOP AUDIENCES</text>
  <rect x="430" y="286" width="80" height="18" rx="9" fill="#1e2445"/>
  <text x="470" y="299" fill="#6b8aff" font-size="9" text-anchor="middle">Age 25–34</text>
  <rect x="430" y="310" width="90" height="18" rx="9" fill="#1e2445"/>
  <text x="475" y="323" fill="#6b8aff" font-size="9" text-anchor="middle">Lookalike 1%</text>
  <rect x="430" y="334" width="75" height="18" rx="9" fill="#1e2445"/>
  <text x="467" y="347" fill="#6b8aff" font-size="9" text-anchor="middle">Retargeting</text>

  <!-- Bottom label -->
  <rect x="0" y="370" width="600" height="30" fill="#0d1117" rx="0"/>
  <rect x="0" y="370" width="600" height="30" fill="#0d1117"/>
  <text x="20" y="389" fill="#5a5f80" font-size="10">Meta Ads · Facebook &amp; Instagram · Managed at PixellKey</text>
  <circle cx="575" cy="385" r="8" fill="#4f6ef7" opacity="0.3"/>
  <text x="575" y="389" fill="#6b8aff" font-size="9" text-anchor="middle" font-weight="700">M</text>
</svg>
