  <text x="214" y="212" text-anchor="middle" font-family="Arial" font-size="22" fill="#EA4335" font-weight="800">₹4.2</text>

  <rect x="286" y="166" width="120" height="56" rx="10" fill="rgba(251,188,5,0.1)" stroke="rgba(251,188,5,0.25)" stroke-width="1"/>
