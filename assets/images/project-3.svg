  </defs>
  <rect width="600" height="380" fill="url(#bg3)" rx="16"/>
  <rect x="0" y="0" width="600" height="48" fill="rgba(255,255,255,0.04)" rx="16"/>
  <text x="22" y="31" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.5)" font-weight="600">GOOGLE ADS · PAN INDIA AWARENESS</text>

  <!-- Google color dots -->
  <circle cx="530" cy="24" r="6" fill="#4285F4"/>
  <circle cx="545" cy="24" r="6" fill="#EA4335"/>
  <circle cx="560" cy="24" r="6" fill="#FBBC05"/>
  <circle cx="575" cy="24" r="6" fill="#34A853"/>

  <!-- Big impression number -->
  <text x="22" y="90" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.4)">TOTAL IMPRESSIONS</text>
  <text x="22" y="136" font-family="Arial" font-size="46" fill="white" font-weight="900">8.4L+</text>
  <rect x="22" y="146" width="120" height="4" rx="2" fill="#4285F4"/>

