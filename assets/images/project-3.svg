  <rect x="430" y="240" width="148" height="100" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="504" y="260" text-anchor="middle" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.4)">DEVICE SPLIT</text>
  <rect x="444" y="270" width="74" height="7" rx="3" fill="#4285F4"/>
  <text x="526" y="278" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)">Mobile 62%</text>
  <rect x="444" y="288" width="46" height="7" rx="3" fill="#EA4335"/>
  <text x="498" y="296" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)">Desktop 38%</text>
  <rect x="444" y="306" width="24" height="7" rx="3" fill="#FBBC05"/>
  <text x="476" y="314" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)">Tablet</text>
