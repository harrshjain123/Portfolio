  <text x="248" y="314" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.4)">2,340</text>

  <text x="72" y="336" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.5)">Pune</text>
